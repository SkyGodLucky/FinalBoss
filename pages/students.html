<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/students.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
  <title>Old School Etudiants</title>
</head>

<body>
  <div class="overlay" id="overlay" onclick="closeMenuMobile()"></div>
  <header>
    <div class="logo">
      <a class="logo_accueil" href="../index.html">
        <img class="logo_school" src="../assets/images/Logo_OldSchool.png" alt="Logo de Old School">
      </a>
    </div>
    <h1>Old School</h1>
    <nav class="header_nav">
      <div class="burger-btn" onclick="openMenuMobile()">&#9776;</div>
      <div class="menu" id="menu">
        <div class="close-btn" onclick="closeMenuMobile()">&times;</div>
        <ul>
          <li><a href="../index.html">Liste des promotions</a></li>
          <li><a href="./students.html">Étudiants</a></li>
        </ul>
      </div>
    </nav>
  </header>
  <main>
    <button id="addStudentBtn">Ajouter un élève</button>
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>E-mail</th>
          <th>Date de naissance</th>
          <th>Promotion actuelle</th>
          <th>Modifier</th>
          <th>Supprimer</th>
        </tr>
      </thead>
      <tbody id="studentTableBody">
      </tbody>
    </table>

    <div id="studentModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Ajouter un étudiant</h2>
        <input type="text" id="nom" placeholder="Nom">
        <input type="text" id="prenom" placeholder="Prénom">
        <input type="email" id="email" placeholder="E-mail">
        <input type="date" id="dob" placeholder="jj/mm/aaaa">
        <select id="promotion">
          <option>Promo-mu</option>
          <option>Promo-alt</option>
        </select>
        <button id="saveStudent">Enregistrer</button>
        <p id="error-message"></p>
      </div>
    </div>
    <script src="../assets/js/students.js"></script>
  </main>
  <footer>
    <div class="logo">
      <a class="logo_accueil" href="../index.html">
        <img class="logo_school" src="../assets/images/Logo_OldSchool.png" alt="Logo de Old School">
      </a>
    </div>
  </footer>
</body>

</html>
