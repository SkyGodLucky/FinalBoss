<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/promo.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
  <title>Old School Accueil</title>
</head>

<body>
  <div class="overlay" id="overlay" onclick="closeMenuMobile()"></div>
  <header>
    <div class="logo">
      <a class="logo_accueil" href="./index.html">
        <img class="logo_school" src="./assets/images/Logo_OldSchool.png" alt="Logo de Old School">
      </a>
    </div>
    <h1>Old School</h1>
    <nav class="header_nav">
      <div class="burger-btn" onclick="openMenuMobile()">&#9776;</div>
      <div class="menu" id="menu">
        <div class="close-btn" onclick="closeMenuMobile()">&times;</div>
        <ul>
          <li><a href="./index.html">Liste des promotions</a></li>
          <li><a href="./pages/students.html">Étudiants</a></li>
        </ul>
      </div>
    </nav>
  </header>
  <main>
    <div id="button-container">
      <button class="newPromo" onclick="openForm()">
        <img src="./assets/images/IconAjou.png" alt="+" class="icon"> Ajouter une promotion
      </button>
    </div>

    <!-- Formulaire qui s'affiche -->
    <div id="form-container" class="form-container" style="display:none;">
      <form id="promo-form">
        <label for="promo-name">Nom de la promo:</label>
        <input type="text" id="promo-name" name="promo-name" required><br><br>

        <label for="start-date">Date de début:</label>
        <input type="date" id="start-date" name="start-date" required><br><br>

        <label for="end-date">Date de fin:</label>
        <input type="date" id="end-date" name="end-date" required><br><br>

        <button type="submit">Ajouter</button>
        <button type="button" onclick="closeForm()">Annuler</button>
      </form>
    </div>

    <div class="promoContainer">
    </div>

    <script src="./assets/js/promo.js"></script>
  </main>

  <!-- <footer>
    <div class="logo">
      <a class="logo_accueil" href="./index.html">
        <img class="logo_school" src="./assets/images/Logo_OldSchool.png" alt="Logo de Old School">
      </a>
    </div>
  </footer> -->

</body>

</html>
